# ════════════════════════════════════════════════════════════════════
# LIVE DEMO — one agent connected to the RunPod hub
#
#   # terminal 1 — logs
#   cd part_3
#   docker compose up --build
#
#   # terminal 2 — interactive console (say / status / pause / ...)
#   cd part_3
#   ./scripts/console.sh
#
# Settings come from .env (HUB_URL, AGENT_NAME, OPENROUTER_API_KEY, etc).
# Detach the console with Ctrl-P Ctrl-Q.
# Stop with Ctrl-C in terminal 1, then `docker compose down` to clean up.
# ════════════════════════════════════════════════════════════════════

services:

  agent:
    build: .
    environment:
      AUTO_APPROVE: "true"
      MAX_ROUNDS: "10"
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    restart: on-failure:3
