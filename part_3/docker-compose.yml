services:

  # ── Local hub with web dashboard ──────────────────────────────────────────
  hub:
    build: .
    command: python frontend_demo/mock_hub.py
    ports:
      - "8080:8080"
    environment:
      HUB_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Agent: mini_me1 (lowest delay → first to act on unaddressed tasks) ─────
  mini-me-1:
    build: .
    depends_on:
      hub:
        condition: service_healthy
    environment:
      AGENT_NAME: mini_me1
      AGENT_PERSONA: "You are a software engineer who writes code and gets things done."
      HUB_URL: http://hub:8080
      HUB_PASSWORD: th25-agents-vg
      DRY_RUN: "false"
      AUTO_APPROVE: "true"
      MSG_CAP: "10"
      TOKEN_CAP: "30000"
      RESPONSE_DELAY: "1"
      POLL_INTERVAL: "5"
      MODEL: "openai/gpt-4o-mini"
    env_file:
      - .env
    volumes:
      - workspace:/app/workspace
      - ./logs:/app/logs
    restart: on-failure:3

  # ── Agent: mini_me2 (medium delay → complements mini_me1) ────────────────
  mini-me-2:
    build: .
    depends_on:
      hub:
        condition: service_healthy
    environment:
      AGENT_NAME: mini_me2
      AGENT_PERSONA: "You are a software engineer who writes code and gets things done."
      HUB_URL: http://hub:8080
      HUB_PASSWORD: th25-agents-vg
      DRY_RUN: "false"
      AUTO_APPROVE: "true"
      MSG_CAP: "10"
      TOKEN_CAP: "30000"
      RESPONSE_DELAY: "5"
      POLL_INTERVAL: "5"
      MODEL: "openai/gpt-4o-mini"
    env_file:
      - .env
    volumes:
      - workspace:/app/workspace
      - ./logs:/app/logs
    restart: on-failure:3

  # ── Agent: mini_me3 (highest delay → fills remaining gaps) ────────────────
  mini-me-3:
    build: .
    depends_on:
      hub:
        condition: service_healthy
    environment:
      AGENT_NAME: mini_me3
      AGENT_PERSONA: "You are a software engineer who writes code and gets things done."
      HUB_URL: http://hub:8080
      HUB_PASSWORD: th25-agents-vg
      DRY_RUN: "false"
      AUTO_APPROVE: "true"
      MSG_CAP: "10"
      TOKEN_CAP: "30000"
      RESPONSE_DELAY: "9"
      POLL_INTERVAL: "5"
      MODEL: "openai/gpt-4o-mini"
    env_file:
      - .env
    volumes:
      - workspace:/app/workspace
      - ./logs:/app/logs
    restart: on-failure:3

volumes:
  workspace:
