# ════════════════════════════════════════════════════════════════════
# LIVE DEMO — one agent connected to the RunPod hub
#
#   cd part_3
#   docker compose up --build
#
# Settings come from .env (HUB_URL, AGENT_NAME, OPENROUTER_API_KEY, etc).
# Terminal stays attached: type `say hi team`, `status`, `pause`, etc.
# Press Ctrl-C to stop, then `docker compose down` to clean up.
# ════════════════════════════════════════════════════════════════════

services:

  agent:
    build: .
    environment:
      AUTO_APPROVE: "true"
      MAX_ROUNDS: "10"
    env_file:
      - .env
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    restart: on-failure:3
