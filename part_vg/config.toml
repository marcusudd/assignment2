# Structural defaults. Model CHOICES live in .env (per-user, never committed).
# Anything here is only a fallback if the matching .env var is unset.

[local]
base_url = "http://localhost:1234/v1"
# model is set via LOCAL_MODEL in .env

[cloud]
base_url = "https://openrouter.ai/api/v1"
# model is set via CLOUD_MODEL in .env

[router]
# model is set via ROUTER_MODEL in .env

[compaction]
# model is set via COMPACTION_MODEL in .env (default "local")
token_threshold = 8000   # compact main-session history above this

[agent]
max_output    = 5000   # tool output cap (chars)
max_rounds    = 15     # per-worker LLM round limit
workspace_dir = "./workspace"

[cost]
cap_usd           = 0.20   # dev cap — raise to 0.50 for real runs, 0.05 for demo
warning_threshold = 0.75   # fraction of cap that triggers warning

comparison_models = [
    "anthropic/claude-opus-4-8",
    "anthropic/claude-sonnet-4-6",
    "anthropic/claude-haiku-4-5",
    "openai/gpt-5.5",
    "openai/gpt-5",
    "openai/gpt-5-mini",
    "google/gemini-2.5-pro",
    "google/gemini-2.5-flash",
    "google/gemini-2.5-flash-lite",
]
