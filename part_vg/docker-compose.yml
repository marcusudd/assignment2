services:
  # Web GUI + API (default) — open http://localhost:8000
  bifrost:
    build: .
    image: bifrost:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOCAL_BASE_URL: http://host.docker.internal:1234/v1
      BIFROST_MOCK: ${BIFROST_MOCK:-}
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./sessions:/app/sessions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Terminal TUI (fallback, no browser)
  bifrost-cli:
    profiles: ["cli"]
    build: .
    image: bifrost:latest
    env_file:
      - .env
    environment:
      LOCAL_BASE_URL: http://host.docker.internal:1234/v1
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./sessions:/app/sessions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    entrypoint: ["python", "main.py"]
    # docker compose --profile cli run --rm bifrost-cli "List Python files"
